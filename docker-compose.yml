version: "3.8"

services:
  # ---------- Nginx ----------
  nginx:
    image: nginx:stable-alpine
    container_name: ci4-nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - ci4-network

  # ---------- PHP-FPM ----------
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ci4-php
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - ci4-network

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: ci4-redis
    ports:
      - "6379:6379"
    networks:
      - ci4-network

  # ---------- MySQL ----------
  mysql:
    image: mysql:8.0
    container_name: ci4-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-NvyRMSk68JUe}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-webapp}
      MYSQL_USER: ${MYSQL_USER:-webapp_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dqgS5uthcuxR}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - ci4-network

networks:
  ci4-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
